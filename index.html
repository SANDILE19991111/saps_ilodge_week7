function computeComplianceMetrics() {
  const tickets = DB.tickets;
  const users   = DB_SERVICE.getUsers ? DB_SERVICE.getUsers() : DB.users || [];
  const now     = new Date();

  // ── 1. Bias Risk: department routing concentration ──────────────────────
  const deptCounts = {};
  DB.departments.forEach(d => { deptCounts[d.dept_name] = 0; });
  tickets.forEach(t => { if (t.department_name) deptCounts[t.department_name] = (deptCounts[t.department_name] || 0) + 1; });
  const totalTickets = tickets.length || 1;
  const deptPcts = Object.entries(deptCounts).map(([name, count]) => ({ name, count, pct: Math.round(count / totalTickets * 100) })).sort((a, b) => b.pct - a.pct);
  const maxDeptPct = deptPcts[0]?.pct || 0;
  const routingBiasRisk = maxDeptPct > 60 ? 'High' : maxDeptPct > 40 ? 'Medium' : 'Low';

  // ── 2. Bias Risk: priority distribution skew ───────────────────────────
  const highPct  = Math.round(tickets.filter(t => t.priority === 'High').length   / totalTickets * 100);
  const medPct   = Math.round(tickets.filter(t => t.priority === 'Medium').length / totalTickets * 100);
  const lowPct   = Math.round(tickets.filter(t => t.priority === 'Low').length    / totalTickets * 100);
  const prioritySkew = highPct > 50 ? 'High' : highPct > 35 ? 'Medium' : 'Low';

  // ── 3. AI Confidence audit ─────────────────────────────────────────────
  const withConf   = tickets.filter(t => t.ai_confidence !== undefined && t.ai_confidence !== null);
  const avgConf    = withConf.length ? Math.round(withConf.reduce((s, t) => s + (t.ai_confidence || 0), 0) / withConf.length * 100) : null;
  const lowConfTickets = withConf.filter(t => (t.ai_confidence || 0) < 0.6);
  const lowConfPct = withConf.length ? Math.round(lowConfTickets.length / withConf.length * 100) : 0;
  const aiConfRisk = lowConfPct > 30 ? 'High' : lowConfPct > 15 ? 'Medium' : 'Low';

  // ── 4. SLA compliance risk ─────────────────────────────────────────────
  const slaTargets = { High: 24, Medium: 48, Low: 72 };
  let slaBreaches = 0, slaTotal = 0;
  tickets.forEach(t => {
    const openedAt = new Date(t.opened_at || t.created_at);
    const closedAt = t.closed_at ? new Date(t.closed_at) : null;
    const hoursOpen = closedAt ? (closedAt - openedAt) / 3600000 : (now - openedAt) / 3600000;
    const target = slaTargets[t.priority] || 48;
    if (!closedAt && hoursOpen > target) { slaBreaches++; }
    slaTotal++;
  });
  const slaBreachPct = slaTotal ? Math.round(slaBreaches / slaTotal * 100) : 0;
  const slaRisk = slaBreachPct > 20 ? 'High' : slaBreachPct > 10 ? 'Medium' : 'Low';

  // ── 5. Data transparency: tickets with no AI reason ───────────────────
  const noReason    = tickets.filter(t => !t.ai_reason || t.ai_reason.trim() === '').length;
  const noReasonPct = Math.round(noReason / totalTickets * 100);
  const transparencyRisk = noReasonPct > 30 ? 'High' : noReasonPct > 10 ? 'Medium' : 'Low';

  // ── 6. Access control audit ────────────────────────────────────────────
  const adminCount    = users.filter(u => u.role === 'admin').length;
  const staffCount    = users.filter(u => u.role === 'staff').length;
  const citizenCount  = users.filter(u => u.role === 'external').length;
  const accessRisk    = adminCount > 3 ? 'High' : adminCount > 1 ? 'Medium' : 'Low';

  // ── 7. Response bias: tickets without admin response (backlog) ─────────
  const noResponse    = tickets.filter(t => !t.admin_response && !['Closed'].includes(t.status)).length;
  const noResponsePct = Math.round(noResponse / totalTickets * 100);
  const responseBacklogRisk = noResponsePct > 60 ? 'High' : noResponsePct > 30 ? 'Medium' : 'Low';

  // ── 8. Overall risk score ──────────────────────────────────────────────
  const riskWeights = { High: 3, Medium: 2, Low: 1 };
  const riskItems = [routingBiasRisk, prioritySkew, aiConfRisk, slaRisk, transparencyRisk, accessRisk, responseBacklogRisk];
  const riskScore = Math.round(riskItems.reduce((s, r) => s + riskWeights[r], 0) / (riskItems.length * 3) * 100);
  const overallRisk = riskScore >= 66 ? 'High' : riskScore >= 40 ? 'Medium' : 'Low';

  // ── 9. Ethical flags ──────────────────────────────────────────────────
  const ethicalFlags = [];
  if (routingBiasRisk !== 'Low') ethicalFlags.push({ flag: 'Routing Concentration Bias', detail: `${deptPcts[0]?.name || 'One department'} receives ${maxDeptPct}% of all tickets — AI routing may be over-indexing on keyword patterns for this category.`, risk: routingBiasRisk, icon: '⚖️' });
  if (aiConfRisk !== 'Low')      ethicalFlags.push({ flag: 'Low-Confidence AI Decisions', detail: `${lowConfPct}% of tickets were routed with AI confidence below 60%. These decisions carry higher risk of misclassification and should be reviewed by a human.`, risk: aiConfRisk, icon: '🤖' });
  if (transparencyRisk !== 'Low') ethicalFlags.push({ flag: 'Missing AI Explainability', detail: `${noReasonPct}% of tickets have no AI routing reason recorded, limiting transparency and auditability of the system's decisions.`, risk: transparencyRisk, icon: '🔍' });
  if (slaRisk !== 'Low')         ethicalFlags.push({ flag: 'SLA Breach Risk — Equitable Service', detail: `${slaBreachPct}% of tickets are at risk of breaching SLA targets. Delayed resolution may disproportionately affect citizens in high-volume periods.`, risk: slaRisk, icon: '⏱️' });
  if (accessRisk !== 'Low')      ethicalFlags.push({ flag: 'Elevated Admin Privilege Count', detail: `${adminCount} admin account${adminCount !== 1 ? 's' : ''} detected. Excessive privileged access increases risk of unauthorised data modification or misuse.`, risk: accessRisk, icon: '🔐' });
  if (responseBacklogRisk !== 'Low') ethicalFlags.push({ flag: 'Response Equity Gap', detail: `${noResponsePct}% of open tickets have not yet received an admin response. Citizens may experience unequal service quality if backlog is not addressed systematically.`, risk: responseBacklogRisk, icon: '📨' });
  if (ethicalFlags.length === 0) ethicalFlags.push({ flag: 'No Critical Flags Detected', detail: 'All monitored compliance dimensions are within acceptable thresholds. Continue routine monitoring and periodic manual review.', risk: 'Low', icon: '✅' });

  return {
    totalTickets, deptPcts, maxDeptPct, routingBiasRisk,
    highPct, medPct, lowPct, prioritySkew,
    avgConf, lowConfPct, lowConfTickets: lowConfTickets.length, aiConfRisk,
    slaBreaches, slaBreachPct, slaRisk,
    noReason, noReasonPct, transparencyRisk,
    adminCount, staffCount, citizenCount, accessRisk,
    noResponse, noResponsePct, responseBacklogRisk,
    riskScore, overallRisk, ethicalFlags,
    riskItems, riskWeights
  };
}

// ── Risk colour helpers ───────────────────────────────────────────────────
function riskColor(r)  { return r === 'High' ? '#dc2626' : r === 'Medium' ? '#f59e0b' : '#10b981'; }
function riskBg(r)     { return r === 'High' ? '#fee2e2' : r === 'Medium' ? '#fef3c7' : '#d1fae5'; }
function riskIcon(r)   { return r === 'High' ? '🔴' : r === 'Medium' ? '🟡' : '🟢'; }

// ── Risk score donut (canvas) ─────────────────────────────────────────────
function drawRiskGauge(canvasId, score) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const cx = W / 2, cy = H / 2 + 10, r = Math.min(W, H) * 0.36;
  const startAngle = Math.PI * 0.75, endAngle = Math.PI * 2.25;
  const sweepTotal = endAngle - startAngle;
  const color = score >= 66 ? '#dc2626' : score >= 40 ? '#f59e0b' : '#10b981';

  // Track
  ctx.beginPath(); ctx.arc(cx, cy, r, startAngle, endAngle);
  ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 14; ctx.lineCap = 'round'; ctx.stroke();

  // Fill
  if (score > 0) {
    ctx.beginPath(); ctx.arc(cx, cy, r, startAngle, startAngle + sweepTotal * (score / 100));
    ctx.strokeStyle = color; ctx.lineWidth = 14; ctx.lineCap = 'round'; ctx.stroke();
  }

  // Centre score
  ctx.fillStyle = color; ctx.font = `bold ${Math.round(r * 0.55)}px system-ui`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(score, cx, cy - 6);
  ctx.fillStyle = '#64748b'; ctx.font = `11px system-ui`;
  ctx.fillText('RISK SCORE', cx, cy + r * 0.38);

  // Labels
  ctx.fillStyle = '#94a3b8'; ctx.font = '9px system-ui';
  ctx.textAlign = 'left';  ctx.fillText('LOW',  cx - r - 4, cy + r * 0.55);
  ctx.textAlign = 'right'; ctx.fillText('HIGH', cx + r + 4, cy + r * 0.55);
}

window.generateRiskEvaluationReport = async function() {

  const m = computeComplianceMetrics();
  const now = new Date();
  const reportDate = now.toLocaleDateString('en-ZA', { day: 'numeric', month: 'long', year: 'numeric' });
  const reportTime = now.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });
  window._complianceReportTs = `${reportDate} at ${reportTime}`;

  let aiNarrative = '', aiRecommendations = [], aiEthicalStatement = '';

  try {
    const prompt = `You are an AI Governance and Compliance Analyst for SAPS iLodge, a South African Police Service ticket management system. Write a professional risk evaluation report section.

Compliance Metrics:
- Overall Risk Score: ${m.riskScore}/100 (${m.overallRisk} risk)

- AI Confidence Risk: ${m.aiConfRisk} (${m.lowConfPct}% low-confidence decisions)
- SLA Breach Risk: ${m.slaRisk} (${m.slaBreachPct}% at risk)
- Transparency Risk: ${m.transparencyRisk} (${m.noReasonPct}% missing AI explanations)
- Access Control Risk: ${m.accessRisk} (${m.adminCount} admin accounts)
- Response Equity Risk: ${m.responseBacklogRisk} (${m.noResponsePct}% unanswered)
- Ethical Flags Raised: ${m.ethicalFlags.map(f=>f.flag).join(', ')}

Respond ONLY with valid JSON (no markdown, no backticks):
{"narrative":"3-4 sentences evaluating the overall governance posture","recommendations":["rec1","rec2","rec3","rec4"],"ethicalStatement":"2 sentences on the ethical implications for citizens","complianceRating":"Compliant|Needs Improvement|Non-Compliant","headline":"Short 8-word compliance report headline"}`;

    const apiRes = await fetch('/api/anthropic', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });
    if (apiRes.ok) {
      const apiData = await apiRes.json();
      const raw = apiData.choices?.[0]?.message?.content || '';

      aiRecommendations = parsed.recommendations || [];
      aiEthicalStatement = parsed.ethicalStatement || '';

window.handleLogin = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  showLoading('🔐 Authenticating…');
  try {
    // Try real backend first to get JWT token (needed by AI chatbot)
    let backendToken = null;
    try {
      const apiRes = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, role: activeRole }),
      });
      if (apiRes.ok) {
        const apiData = await apiRes.json();
        backendToken = apiData.token;
      }
    } catch(_) { /* backend not available — fall through to in-memory */ }

    // Always sync in-memory store for UI state
    DB_SERVICE.login(email, password, activeRole);
    currentUser = DB_SERVICE.getCurrentUser();

    // Store JWT for chatbot API calls
    if (backendToken) sessionStorage.setItem('saps_token', backendToken);

    staffActiveTab = 'lodge'; citizenActiveTab = 'lodge';
    citizenStatusTab = 'all'; staffStatusTab = 'all';
    adminActiveTab = 'tickets'; openTicketTabs.clear();
    chatHistory = [];
    hideLoading();
    render();
    // Show chatbot after login
    setTimeout(() => {
      if (currentUser.role === 'admin') {
        document.getElementById('adminChatWidget').classList.add('visible');
        updateAdminChatBadge();
      } else {
        document.getElementById('chatWidget').classList.add('visible');
      }
    }, 500);
  } catch(e) { hideLoading(); document.getElementById('loginMsg').innerHTML=`<div class="alert alert-error">❌ ${e.message}</div>`; }
};

let adminChatOpen = false;
let adminChatActiveUser = null; // currently selected user tab
let adminChatLastRead = {}; // uid -> ISO timestamp of last message admin has seen

window.toggleAdminChat = function() {
  adminChatOpen = !adminChatOpen;
  const panel = document.getElementById('adminChatPanelWidget');
  const btn = document.getElementById('adminChatToggleBtn');
  if (adminChatOpen) {
    panel.classList.add('open');
    btn.innerHTML = '✕<span class="admin-chat-badge" id="adminChatBadge"></span>';
    refreshAdminChatWidget();
    setTimeout(() => document.getElementById('adminChatInput')?.focus(), 200);
  } else {
    panel.classList.remove('open');
    btn.innerHTML = '💬<span class="admin-chat-badge" id="adminChatBadge"></span>';
    updateAdminChatBadge();
  }
};

function updateAdminChatBadge() {
  const badge = document.getElementById('adminChatBadge');
  if (!badge) return;
  const unread = DB.chatMessages.filter(m => !m.is_admin).length;
  if (unread > 0) { badge.textContent = unread; badge.classList.add('show'); }
  else { badge.classList.remove('show'); }
}

function refreshAdminChatWidget() {
  const userMessages = DB.chatMessages.filter(m => !m.is_admin);
  const senderIds = [...new Set(userMessages.map(m => m.from_user_id))];
  const tabsEl = document.getElementById('adminChatUserTabs');
  const msgsEl = document.getElementById('adminChatMessages');
  if (!tabsEl || !msgsEl) return;

  if (senderIds.length === 0) {
    tabsEl.innerHTML = '';
    msgsEl.innerHTML = '<div class="achat-no-users">💬 No user messages yet.<br><span style="font-size:0.8rem;margin-top:8px;display:block;">When citizens or staff send messages via "Chat with Admin", they appear here.</span></div>';
    document.getElementById('adminChatInput').disabled = true;
    document.getElementById('adminChatSendBtn').disabled = true;
    return;
  }

  document.getElementById('adminChatInput').disabled = false;
  document.getElementById('adminChatSendBtn').disabled = false;

  if (!adminChatActiveUser || !senderIds.includes(adminChatActiveUser)) {
    adminChatActiveUser = senderIds[0];
  }
  // Mark active user's thread as read up to now
  adminChatLastRead[adminChatActiveUser] = new Date().toISOString();

  // Build user tabs — unread = user messages newer than admin's last-read marker for that user
  tabsEl.innerHTML = senderIds.map(uid => {
    const user = DB.users.find(u => u.id === uid);
    const name = user?.full_name || uid;
    const userMsgsForTab = DB.chatMessages.filter(m => m.from_user_id === uid && !m.is_admin);
    const lastReadTime = adminChatLastRead[uid] || null;
    const unread = userMsgsForTab.filter(m => !lastReadTime || new Date(m.timestamp) > new Date(lastReadTime)).length;
    return `<button class="achat-user-tab ${adminChatActiveUser === uid ? 'active' : ''}" onclick="window.selectAdminChatUser('${uid}')">
      ${name.split(' ')[0]}${unread > 0 ? `<span class="tab-badge">${unread}</span>` : ''}
    </button>`;
  }).join('');

  // Show conversation for active user
  renderAdminChatConversation();
}

function renderAdminChatConversation() {
  const msgsEl = document.getElementById('adminChatMessages');
  if (!msgsEl || !adminChatActiveUser) return;
  const userMsgs = DB.chatMessages.filter(m => m.from_user_id === adminChatActiveUser && !m.is_admin);
  const adminReplies = DB.chatMessages.filter(m => m.to_user_id === adminChatActiveUser && m.is_admin);
  const thread = [...userMsgs, ...adminReplies].sort((a,b) => new Date(a.timestamp)-new Date(b.timestamp));

  if (thread.length === 0) {
    msgsEl.innerHTML = '<div class="achat-no-users">No messages in this conversation yet.</div>';
    return;
  }

  msgsEl.innerHTML = thread.map(m => {
    if (m.is_admin) {
      return `<div style="display:flex;flex-direction:column;align-items:flex-end;">
        <div class="achat-msg-label right">You (Admin)</div>
        <div class="achat-msg-admin">${m.message.replace(/\n/g,'<br>')}</div>
        <div style="font-size:0.65rem;color:#94a3b8;margin-top:2px;">${new Date(m.timestamp).toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>`;
    } else {
      return `<div style="display:flex;flex-direction:column;align-items:flex-start;">
        <div class="achat-msg-label">${m.from_name}</div>
        <div class="achat-msg-user">${m.message.replace(/\n/g,'<br>')}</div>
        <div style="font-size:0.65rem;color:#94a3b8;margin-top:2px;">${new Date(m.timestamp).toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>`;
    }
  }).join('');
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

window.selectAdminChatUser = function(uid) {
  adminChatActiveUser = uid;
  refreshAdminChatWidget();
};

window.clearAdminChatConversation = function() {
  if (!adminChatActiveUser) return;
  if (!confirm('Clear this conversation? This cannot be undone.')) return;
  const uid = adminChatActiveUser;
  DB.chatMessages = DB.chatMessages.filter(m => !(
    (m.from_user_id === uid && !m.is_admin) ||
    (m.to_user_id === uid && m.is_admin)
  ));
  delete adminChatLastRead[uid];
  refreshAdminChatWidget();
  // If that user's chatbot is open on admin tab, refresh their thread too
  if (chatOpen && chatMode === 'admin' && currentUser?.id === uid) {
    renderUserAdminThread();
  }
};

window.sendAdminWidgetMessage = function() {
  const input = document.getElementById('adminChatInput');
  const text = input?.value?.trim();
  if (!text || !adminChatActiveUser) return;
  input.value = '';
  DB.chatMessages.push({
    id: DB.nextChatMsgId++,
    from_user_id: currentUser.id,
    from_name: currentUser.name,
    to_user_id: adminChatActiveUser,
    message: text,
    timestamp: new Date().toISOString(),
    is_admin: true,
    role: 'admin',
  });
  // Refresh admin widget conversation
  refreshAdminChatWidget();
  // If citizen/staff chatbot is open on the admin-chat tab, refresh their thread too
  const userIsViewingThread = chatOpen && chatMode === 'admin';
  if (userIsViewingThread) {
    renderUserAdminThread();
  } else {
    // Show badge on citizen/staff chatbot button (new admin reply arrived)
    const citizenBadge = document.getElementById('chatBadge');
    if (citizenBadge) {
      citizenBadge.textContent = '1';
      citizenBadge.classList.add('show');
    }
  }
};

// Automation Rules Store
const AUTOMATION = {
  rules: {
    autoRoute:        { enabled: true,  label: 'Auto-Route Tickets via AI',          desc: 'AI assigns department on submission' },
    emailOnSubmit:    { enabled: true,  label: 'Email: Ticket Submitted',             desc: 'Notify user when ticket is lodged' },
    emailOnUpdate:    { enabled: true,  label: 'Email: Status Changed',              desc: 'Notify user on every status update' },
    emailOnResponse:  { enabled: true,  label: 'Email: Admin Response Received',     desc: 'Notify user when admin replies' },
    escalateHighPri:  { enabled: true,  label: 'Auto-Escalate High Priority > 24h',  desc: 'Flag overdue high-priority tickets' },
    slaAlert:         { enabled: true,  label: 'SLA Breach Alert',                   desc: 'Alert when ticket breaches SLA window' },
    approvalWorkflow: { enabled: true,  label: 'Approval Workflow for Sensitive',    desc: 'Finance/HR tickets need approval' },
    weeklyDigest:     { enabled: false, label: 'Weekly Admin Digest Email',          desc: 'Summary report every Monday morning' },
  },
  notifications: [],   // simulated email log
  approvalQueue: [],   // pending approvals
  nextNotifId: 1,
  stats: { emailsSent: 0, autoRouted: 0, escalations: 0, approvalsPending: 0 },
};

// ── Trigger Automation (called on ticket events) ─────────────────────────────
function triggerAutomation(event, ticket) {
  const now = new Date();
  const fmt = d => new Date(d).toLocaleString('en-ZA', { dateStyle:'short', timeStyle:'short' });
  const log = (type, msg) => {
    AUTOMATION.notifications.unshift({
      id: AUTOMATION.nextNotifId++, type, msg,
      ticket: ticket.ticket_number, ts: now.toISOString()
    });
    if (AUTOMATION.notifications.length > 50) AUTOMATION.notifications.pop();
  };

  if (event === 'submitted') {
    if (AUTOMATION.rules.autoRoute.enabled) {
      AUTOMATION.stats.autoRouted++;
      log('routing', `🔀 Auto-routed ${ticket.ticket_number} → ${ticket.department_name} (AI confidence: ${Math.round((ticket.ai_confidence||0)*100)}%)`);
    }
    if (AUTOMATION.rules.emailOnSubmit.enabled) {
      AUTOMATION.stats.emailsSent++;
      log('email', `📧 Email sent to ${ticket.full_name}: "Your complaint ${ticket.ticket_number} has been received and routed to ${ticket.department_name}."`);
    }
    if (AUTOMATION.rules.approvalWorkflow.enabled && ['Finance','Human Resources'].includes(ticket.department_name)) {
      AUTOMATION.approvalQueue.push({ ...ticket, approval_status: 'Pending', requested_at: now.toISOString() });
      AUTOMATION.stats.approvalsPending++;
      log('approval', `⚠️ ${ticket.ticket_number} added to Approval Queue — ${ticket.department_name} requires supervisor sign-off.`);
    }
    if (AUTOMATION.rules.escalateHighPri.enabled && ticket.priority === 'High') {
      log('escalation', `🚨 High-priority ticket ${ticket.ticket_number} flagged for 24h SLA monitoring.`);
    }
  }

  if (event === 'status_changed') {
    if (AUTOMATION.rules.emailOnUpdate.enabled) {
      AUTOMATION.stats.emailsSent++;
      log('email', `📧 Email sent to ${ticket.full_name}: "Ticket ${ticket.ticket_number} status updated to '${ticket.status}'."`);
    }
    if (ticket.status === 'Resolved' || ticket.status === 'Closed') {
      log('email', `📧 Closure email sent — ${ticket.ticket_number} resolved. Satisfaction survey link included.`);
      AUTOMATION.stats.emailsSent++;
    }
  }

  if (event === 'response_added') {
    if (AUTOMATION.rules.emailOnResponse.enabled) {
      AUTOMATION.stats.emailsSent++;
      log('email', `📧 Email sent to ${ticket.full_name}: "Admin has responded to your ticket ${ticket.ticket_number}. Log in to view."`);
    }
  }

  if (event === 'sla_breach') {
    if (AUTOMATION.rules.slaAlert.enabled) {
      AUTOMATION.stats.escalations++;
      log('sla', `⏰ SLA Breach: ${ticket.ticket_number} (${ticket.priority}) has been open > ${ticket.priority==='High'?'24h':ticket.priority==='Medium'?'72h':'120h'} without resolution.`);
    }
    if (AUTOMATION.rules.escalateHighPri.enabled && ticket.priority === 'High') {
      log('escalation', `🚨 Auto-escalated ${ticket.ticket_number} to Senior Supervisor — SLA exceeded.`);
      AUTOMATION.stats.escalations++;
    }
  }
}

// ── Hook automation into existing ticket functions ───────────────────────────
const _origCreate = DB_SERVICE.createTicket.bind(DB_SERVICE);
DB_SERVICE.createTicket = function(stationId, description, priority) {
  const result = _origCreate(stationId, description, priority);
  const ticket = DB.tickets.find(t => t.ticket_number === result.ticketNumber);
  if (ticket) triggerAutomation('submitted', ticket);
  checkSLABreaches();
  return result;
};

const _origStatus = DB_SERVICE.updateTicketStatus.bind(DB_SERVICE);
DB_SERVICE.updateTicketStatus = function(ticketNumber, status) {
  const result = _origStatus(ticketNumber, status);
  const ticket = DB.tickets.find(t => t.ticket_number === ticketNumber);
  if (ticket) triggerAutomation('status_changed', ticket);
  return result;
};

const _origResponse = DB_SERVICE.addAdminResponse.bind(DB_SERVICE);
DB_SERVICE.addAdminResponse = function(ticketNumber, response) {
  const result = _origResponse(ticketNumber, response);
  const ticket = DB.tickets.find(t => t.ticket_number === ticketNumber);
  if (ticket) triggerAutomation('response_added', ticket);
  return result;
};

// ── SLA Breach Scanner ───────────────────────────────────────────────────────
function checkSLABreaches() {
  const now = Date.now();
  const slaHours = { High: 24, Medium: 72, Low: 120 };
  DB.tickets.forEach(t => {
    if (['Resolved','Closed'].includes(t.status)) return;
    if (t._slaFlagged) return;
    const ageHours = (now - new Date(t.opened_at).getTime()) / 3600000;
    const limit = slaHours[t.priority] || 72;
    if (ageHours > limit) {
      t._slaFlagged = true;
      triggerAutomation('sla_breach', t);
    }
  });
}

// Run SLA check on load
checkSLABreaches();

// Seed some starter notifications from existing tickets
(function seedNotifications() {
  DB.tickets.forEach(t => {
    triggerAutomation('submitted', t);
    if (t.admin_response) triggerAutomation('response_added', t);
    if (t.status !== 'Pending') triggerAutomation('status_changed', t);
  });
})();

// ── Approval Actions ─────────────────────────────────────────────────────────
window.approveTicket = function(ticketNumber) {
  const idx = AUTOMATION.approvalQueue.findIndex(t => t.ticket_number === ticketNumber);
  if (idx === -1) return;
  AUTOMATION.approvalQueue[idx].approval_status = 'Approved';
  const ticket = DB.tickets.find(t => t.ticket_number === ticketNumber);
  if (ticket) {
    ticket.status = 'In Progress';
    AUTOMATION.notifications.unshift({
      id: AUTOMATION.nextNotifId++, type: 'approval',
      msg: `✅ ${ticketNumber} APPROVED by ${currentUser.name} — moved to In Progress.`,
      ticket: ticketNumber, ts: new Date().toISOString()
    });
    AUTOMATION.stats.approvalsPending = Math.max(0, AUTOMATION.stats.approvalsPending - 1);
    AUTOMATION.stats.emailsSent++;
    AUTOMATION.notifications.unshift({
      id: AUTOMATION.nextNotifId++, type: 'email',
      msg: `📧 Email sent: "${ticketNumber} has been approved and is now In Progress."`,
      ticket: ticketNumber, ts: new Date().toISOString()
    });
  }
  renderAutomationDashboard();
};

window.rejectTicket = function(ticketNumber) {
  const idx = AUTOMATION.approvalQueue.findIndex(t => t.ticket_number === ticketNumber);
  if (idx === -1) return;
  AUTOMATION.approvalQueue[idx].approval_status = 'Rejected';
  AUTOMATION.stats.approvalsPending = Math.max(0, AUTOMATION.stats.approvalsPending - 1);
  AUTOMATION.notifications.unshift({
    id: AUTOMATION.nextNotifId++, type: 'escalation',
    msg: `❌ ${ticketNumber} REJECTED by ${currentUser.name} — user notified for resubmission.`,
    ticket: ticketNumber, ts: new Date().toISOString()
  });
  renderAutomationDashboard();
};

window.toggleRule = function(ruleKey) {
  if (AUTOMATION.rules[ruleKey]) {
    AUTOMATION.rules[ruleKey].enabled = !AUTOMATION.rules[ruleKey].enabled;
  }
  // re-render just the rules section without full page reload
  const rulesEl = document.getElementById('automationRules');
  if (rulesEl) rulesEl.innerHTML = buildRulesHTML();
};

// ── SLA Compliance Data ──────────────────────────────────────────────────────
function getSLAData() {
  const slaHours = { High: 24, Medium: 72, Low: 120 };
  const now = Date.now();
  const result = { High: { total:0, compliant:0 }, Medium: { total:0, compliant:0 }, Low: { total:0, compliant:0 } };
  DB.tickets.forEach(t => {
    const p = t.priority;
    if (!result[p]) return;
    result[p].total++;
    const age = (now - new Date(t.opened_at).getTime()) / 3600000;
    if (['Resolved','Closed'].includes(t.status) || age <= slaHours[p]) result[p].compliant++;
  });
  return result;
}

// ── Build Rules HTML ─────────────────────────────────────────────────────────
function buildRulesHTML() {
  return Object.entries(AUTOMATION.rules).map(([key, rule]) => `
    <div class="rule-row">
      <div>
        <div class="rule-label">${rule.label}</div>
        <div class="rule-meta">${rule.desc}</div>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" ${rule.enabled ? 'checked' : ''} onchange="window.toggleRule('${key}')">
        <span class="toggle-slider"></span>
      </label>
    </div>`).join('');
}

// ── Main Render ──────────────────────────────────────────────────────────────
function renderAutomationDashboard() {
  const c = document.getElementById('adminContent'); if (!c) return;
  const sla = getSLAData();
  const pendingApprovals = AUTOMATION.approvalQueue.filter(t => t.approval_status === 'Pending');
  const totalEmails = AUTOMATION.stats.emailsSent;
  const totalRouted = AUTOMATION.stats.autoRouted;
  const totalEsc = AUTOMATION.stats.escalations;

  const notifTypeColor = { email:'email', routing:'routing', escalation:'escalation', approval:'approval', sla:'sla' };

  const slaBar = (label, data, color) => {
    const pct = data.total ? Math.round(data.compliant / data.total * 100) : 100;
    return `<div class="sla-bar-wrap">
      <div class="sla-bar-label"><span>${label} Priority</span><span>${pct}% compliant (${data.compliant}/${data.total})</span></div>
      <div class="sla-bar-bg"><div class="sla-bar-fill" style="width:${pct}%;background:${color};"></div></div>
    </div>`;
  };

  c.innerHTML = `
  <!-- Header -->
  <div style="margin-bottom:20px;">
    <h3 style="color:#1e293b;font-size:1.2rem;margin-bottom:4px;">⚙️ Week 7 — Workflow Automation & System Integration</h3>
    <p style="color:#64748b;font-size:0.85rem;">Automate ticket routing, email notifications, approval workflows and SLA monitoring.</p>
  </div>

  <!-- KPI Stats -->
  <div class="workflow-stats">
    <div class="wf-stat"><div class="wf-num">${totalEmails}</div><div class="wf-lbl">📧 Emails Sent</div></div>
    <div class="wf-stat" style="background:linear-gradient(135deg,#0369a1,#0ea5e9);"><div class="wf-num">${totalRouted}</div><div class="wf-lbl">🔀 Auto-Routed</div></div>
    <div class="wf-stat" style="background:linear-gradient(135deg,#b45309,#f59e0b);"><div class="wf-num">${totalEsc}</div><div class="wf-lbl">🚨 Escalations</div></div>
    <div class="wf-stat" style="background:linear-gradient(135deg,#7c3aed,#a855f7);"><div class="wf-num">${pendingApprovals.length}</div><div class="wf-lbl">⏳ Pending Approvals</div></div>
  </div>

  <div class="automation-grid">
    <!-- Automation Rules -->
    <div class="automation-card">
      <h4>🔧 Automation Rules</h4>
      <div id="automationRules">${buildRulesHTML()}</div>
    </div>

    <!-- SLA Compliance -->
    <div class="automation-card">
      <h4>⏱️ SLA Compliance Monitor</h4>
      ${slaBar('High (24h)', sla.High, '#dc2626')}
      ${slaBar('Medium (72h)', sla.Medium, '#f97316')}
      ${slaBar('Low (120h)', sla.Low, '#16a34a')}
      <div style="margin-top:16px;padding:12px 14px;background:#f0fdf4;border-radius:12px;border:1px solid #86efac;font-size:0.82rem;color:#15803d;">
        <strong>⚡ Auto-actions enabled:</strong> SLA breaches trigger escalation emails and supervisor alerts automatically.
      </div>
    </div>
  </div>

  <!-- Approval Workflow Queue -->
  <div class="full-automation-card">
    <h4 style="font-size:1rem;color:#1e293b;margin-bottom:14px;display:flex;align-items:center;gap:8px;">
      ✅ Approval Workflow Queue
      ${pendingApprovals.length > 0 ? `<span style="background:#fef9c3;color:#854d0e;border:1px solid #fde68a;padding:2px 10px;border-radius:20px;font-size:0.72rem;font-weight:700;">${pendingApprovals.length} PENDING</span>` : '<span style="background:#d1fae5;color:#065f46;border:1px solid #86efac;padding:2px 10px;border-radius:20px;font-size:0.72rem;font-weight:700;">ALL CLEAR</span>'}
    </h4>
    ${AUTOMATION.approvalQueue.length === 0
      ? `<div style="text-align:center;padding:30px;color:#94a3b8;">No tickets require approval yet. Finance and HR tickets will appear here.</div>`
      : `<div class="approval-queue">
          ${AUTOMATION.approvalQueue.map(t => `
            <div class="approval-item" style="${t.approval_status!=='Pending'?'opacity:0.6;':''}">
              <div class="approval-item-header">
                <span style="font-weight:700;color:#1e293b;">🎫 ${t.ticket_number}</span>
                <span style="font-size:0.75rem;background:${t.approval_status==='Approved'?'#d1fae5':t.approval_status==='Rejected'?'#fee2e2':'#fef9c3'};color:${t.approval_status==='Approved'?'#065f46':t.approval_status==='Rejected'?'#b91c1c':'#92400e'};padding:3px 10px;border-radius:20px;font-weight:700;">${t.approval_status}</span>
              </div>
              <div style="font-size:0.82rem;color:#475569;margin-bottom:4px;">📂 ${t.department_name} &nbsp;·&nbsp; 👤 ${t.full_name} &nbsp;·&nbsp; 🔴 ${t.priority}</div>
              <div style="font-size:0.82rem;color:#64748b;margin-bottom:8px;">${t.description.substring(0,100)}${t.description.length>100?'…':''}</div>
              ${t.approval_status === 'Pending' ? `
              <div class="approval-actions">
                <button class="btn-approve" onclick="window.approveTicket('${t.ticket_number}')">✅ Approve</button>
                <button class="btn-reject" onclick="window.rejectTicket('${t.ticket_number}')">❌ Reject</button>
                <span style="font-size:0.75rem;color:#94a3b8;">Requested: ${new Date(t.requested_at).toLocaleString('en-ZA')}</span>
              </div>` : ''}
            </div>`).join('')}
        </div>`
    }
  </div>

  <!-- Notification Log -->
  <div class="full-automation-card">
    <h4 style="font-size:1rem;color:#1e293b;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;">
      <span>📋 Automation Activity Log</span>
      <span style="font-size:0.75rem;color:#94a3b8;font-weight:400;">${AUTOMATION.notifications.length} events recorded</span>
    </h4>
    ${AUTOMATION.notifications.length === 0
      ? `<div style="text-align:center;padding:30px;color:#94a3b8;">No automation events yet. Submit or update a ticket to trigger automations.</div>`
      : `<div class="notif-log">
          ${AUTOMATION.notifications.map(n => `
            <div class="notif-item ${notifTypeColor[n.type]||'email'}">
              <div>${n.msg}</div>
              <div class="notif-time">🎫 ${n.ticket} &nbsp;·&nbsp; ${new Date(n.ts).toLocaleString('en-ZA',{dateStyle:'short',timeStyle:'short'})}</div>
            </div>`).join('')}
        </div>`
    }
  </div>`;
}

// Init
render();
</script>
</body>
</html>
